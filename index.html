<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>执勤卡片系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%}
        body{
            font-family:"Microsoft YaHei","PingFang SC",-apple-system,sans-serif;
            background:linear-gradient(135deg,#e8edf4 0%,#f0f2f5 40%,#e0e8f0 100%);
            color:#333;height:100vh;width:100vw;overflow:hidden;position:relative
        }
        body::before{
            content:'';position:fixed;top:0;left:0;right:0;bottom:0;
            background-image:linear-gradient(rgba(26,58,92,.03) 1px,transparent 1px),
                linear-gradient(90deg,rgba(26,58,92,.03) 1px,transparent 1px);
            background-size:60px 60px;z-index:0;pointer-events:none
        }
        .top-bar{
            position:fixed;top:0;left:0;right:0;z-index:10;padding:22px 44px;
            display:flex;justify-content:space-between;align-items:center;
            background:linear-gradient(180deg,rgba(255,255,255,.7) 0%,transparent 100%);
            pointer-events:none
        }
        .top-bar .brand{font-size:12px;font-weight:600;color:#4a6a85;letter-spacing:3px;text-transform:uppercase}
        .top-bar .version{font-size:11px;color:#8a9aa8;letter-spacing:1px}
        .shell{
            position:relative;z-index:2;height:100vh;width:100vw;
            display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px
        }
        .hero-card{
            background:#fff;border-radius:16px;
            box-shadow:0 4px 24px rgba(26,58,92,.08),0 1px 3px rgba(26,58,92,.04);
            padding:48px 52px 44px;text-align:center;max-width:620px;width:100%;
            position:relative;overflow:hidden;transition:box-shadow .3s
        }
        .hero-card:hover{box-shadow:0 8px 40px rgba(26,58,92,.12),0 1px 3px rgba(26,58,92,.06)}
        .hero-card::before{
            content:'';position:absolute;top:0;left:0;right:0;height:4px;
            background:linear-gradient(90deg,#1a3a5c,#2d6a9f,#4a8ab5)
        }
        .hero-card .emblem{
            width:64px;height:64px;margin:0 auto 18px;
            background:linear-gradient(135deg,#1a3a5c,#2d6a9f);border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:28px;color:#fff;box-shadow:0 6px 16px rgba(26,58,92,.2)
        }
        .hero-card h1{font-size:28px;font-weight:700;color:#1a3a5c;letter-spacing:3px;margin-bottom:4px}
        .hero-card .sub{font-size:13px;color:#8a9aa8;letter-spacing:4px;font-weight:500;margin-bottom:16px;text-transform:uppercase}
        .hero-card .divider{width:48px;height:3px;background:linear-gradient(90deg,#1a3a5c,#2d6a9f);margin:0 auto 16px;border-radius:2px}
        .hero-card .desc{font-size:14px;color:#7a8a9a;line-height:1.7;margin-bottom:4px}
        .hero-card .meta-row{display:flex;justify-content:center;gap:24px;margin-top:12px;flex-wrap:wrap}
        .hero-card .meta-item{font-size:12px;color:#9aabb8;letter-spacing:1px}
        .hero-card .meta-item .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#2d6a9f;margin-right:6px;vertical-align:middle}
        .entries{display:flex;flex-direction:column;gap:12px;margin-top:24px;align-items:center}
        .entry-btn{
            display:inline-flex;align-items:center;gap:14px;
            padding:14px 32px 14px 24px;
            background:linear-gradient(135deg,#1a3a5c,#2d6a9f);border-radius:10px;
            text-decoration:none;transition:all .3s;
            box-shadow:0 4px 12px rgba(26,58,92,.2);width:100%;max-width:420px
        }
        .entry-btn:hover{
            transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,58,92,.3);
            background:linear-gradient(135deg,#1e4268,#3478b0)
        }
        .entry-btn .eb-icon{font-size:18px;color:rgba(255,255,255,.8)}
        .entry-btn .eb-text{text-align:left;flex:1}
        .entry-btn .eb-text .eb-title{font-size:15px;font-weight:600;color:#fff;letter-spacing:1px}
        .entry-btn .eb-text .eb-desc{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px}
        .entry-btn .eb-arrow{font-size:20px;color:rgba(255,255,255,.4);transition:all .3s;margin-left:4px}
        .entry-btn:hover .eb-arrow{color:#fff;transform:translateX(4px)}
        .bottom-bar{
            position:fixed;bottom:0;left:0;right:0;z-index:10;padding:20px 44px;text-align:center;
            background:linear-gradient(0deg,rgba(255,255,255,.5) 0%,transparent 100%);pointer-events:none
        }
        .bottom-bar span{font-size:10px;color:#b0c0ce;letter-spacing:3px;text-transform:uppercase}
        @media(max-width:600px){
            .hero-card{padding:32px 20px 28px;margin:0 12px}
            .hero-card h1{font-size:22px}
            .entry-btn{padding:12px 20px 12px 16px;gap:10px}
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="brand">ATC</span>
        <span class="version">执勤卡片系统</span>
    </div>
    <div class="shell">
        <div class="hero-card">
            <div class="emblem">✈</div>
            <h1>执勤卡片</h1>
            <div class="sub">Schedule Card System</div>
            <div class="divider"></div>
            <p class="desc">电子化排班与执勤管理</p>
            <div class="meta-row">
                <span class="meta-item"><span class="dot"></span> 5月30日</span>
            </div>
            <div class="entries">
                <a class="entry-btn" href="./执勤卡片0530.html">
                    <span class="eb-icon">📋</span>
                    <span class="eb-text">
                        <div class="eb-title">进入执勤卡片</div>
                        <div class="eb-desc">5月30日 · 全员排班与席位查询</div>
                    </span>
                    <span class="eb-arrow">→</span>
                </a>
            </div>
        </div>
    </div>
    <div class="bottom-bar">
        <span>Internal Use Only</span>
    </div>
</body>
</html>
