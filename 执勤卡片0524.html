<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>大兴塔台一室 5月24日 执勤卡片</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;background:#f0f2f5;color:#333;padding:24px 48px}.header{background:linear-gradient(135deg,#1a3a5c 0%,#2d6a9f 100%);color:#fff;padding:24px 36px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}.header h1{font-size:26px}.header .meta{font-size:12px;opacity:.85}.search-bar{margin-bottom:8px;text-align:center}.search-wrapper{display:inline-block;position:relative;width:100%;max-width:500px}.search-wrapper input{width:100%;border:2px solid #ddd;border-radius:24px;padding:12px 20px;font-size:16px;outline:none;box-sizing:border-box}.search-wrapper input:focus{border-color:#2d6a9f}.suggestions{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:0 0 6px 6px;max-height:200px;overflow-y:auto;z-index:100;display:none;box-shadow:0 4px 8px rgba(0,0,0,.1)}.suggestions.show{display:block}.count{text-align:center;font-size:12px;color:#999;margin-bottom:16px}.suggestion-item{padding:8px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f2f5}.suggestion-item:hover{background:#e3f2fd}.suggestion-item:last-child{border-bottom:none}.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(550px,1fr));gap:16px}.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}.card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f2f5}.card-header .name{font-size:16px;font-weight:700;color:#1a3a5c}.card-header .hours{font-size:13px;color:#888}.card-header .hours b{color:#e15759}.card-header .warn-badge{font-size:11px;background:#fde8e8;color:#c53030;padding:2px 8px;border-radius:10px;margin-left:8px}.card-body{padding:8px 16px 12px}.timeline{position:relative;height:36px;background:#f8f9fb;border-radius:4px;margin:4px 0;overflow:visible}.timeline .tick{position:absolute;top:0;width:1px;height:100%;background:#e8e8e8}.timeline .tick.major{background:#ccc}.timeline .tick-label{position:absolute;top:-14px;font-size:9px;color:#aaa;transform:translateX(-50%);white-space:nowrap}.timeline .block{position:absolute;top:2px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;overflow:hidden;white-space:nowrap;cursor:default;opacity:.9}.timeline .block:hover{opacity:1;z-index:10}.interval-list{font-size:11px;color:#666;margin-top:6px;line-height:1.6}.interval-list span.tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;color:#fff;margin-right:3px;vertical-align:middle}.card.hidden{display:none}.no-result{text-align:center;color:#aaa;padding:40px;font-size:14px;display:none}.footer{text-align:center;color:#bbb;font-size:11px;padding:20px;margin-top:10px}
